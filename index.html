<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Master - User App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #008000; color: white; font-family: sans-serif; }
        .btn-red { background-color: #ff0000; transition: 0.3s; }
        .btn-red:hover { background-color: #cc0000; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .nav-item { cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .nav-item:hover { opacity: 1; color: #ff0000; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex justify-between items-center sticky top-0 bg-green-900 z-50">
        <h1 class="text-xl font-bold tracking-wider">EARN<span class="text-red-500">PRO</span></h1>
        <div class="glass-card px-4 py-1 flex items-center gap-2">
            <i class="fas fa-wallet text-yellow-400"></i>
            <span id="balance" class="font-bold text-sm">0.00</span>
        </div>
    </header>

    <main id="app-content" class="p-4 min-h-screen">
        </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-md border-t border-white/10 flex justify-around p-3 z-50">
        <div onclick="render('video')" class="nav-item text-center">
            <i class="fas fa-play-circle text-xl"></i>
            <p class="text-[10px] uppercase mt-1">Video</p>
        </div>
        <div onclick="render('ads')" class="nav-item text-center">
            <i class="fas fa-ad text-xl"></i>
            <p class="text-[10px] uppercase mt-1">Ads</p>
        </div>
        <div onclick="render('product')" class="nav-item text-center">
            <i class="fas fa-shopping-bag text-xl"></i>
            <p class="text-[10px] uppercase mt-1">Shop</p>
        </div>
        <div onclick="render('profile')" class="nav-item text-center">
            <i class="fas fa-user-circle text-xl"></i>
            <p class="text-[10px] uppercase mt-1">Profile</p>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // ⚠️ আপনার ফায়ারবেস কনফিগারেশন এখানে দিন
        
const firebaseConfig = {
  apiKey: "AIzaSyA7JriiGg8ebYIhasc94vZf7y0LEhdLJ0Y",
  authDomain: "tcoin-9800d.firebaseapp.com",
  databaseURL: "https://tcoin-9800d-default-rtdb.firebaseio.com",
  projectId: "tcoin-9800d",
  storageBucket: "tcoin-9800d.firebasestorage.app",
  messagingSenderId: "473266283562",
  appId: "1:473266283562:web:c91bfe33004e63cf074f53",
  measurementId: "G-280N3BRSQT"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global function for navigation
        window.render = async (page) => {
            const root = document.getElementById('app-content');
            root.innerHTML = `<div class="flex justify-center mt-20"><div class="animate-spin h-8 w-8 border-4 border-white border-t-transparent rounded-full"></div></div>`;

            try {
                if (page === 'video') {
                    const snap = await getDocs(query(collection(db, "videos"), orderBy("createdAt", "desc")));
                    let html = `<h2 class="text-lg font-bold mb-4">🎬 Watch Videos</h2>`;
                    snap.forEach(doc => {
                        const data = doc.data();
                        html += `
                        <div class="glass-card p-3 mb-4 flex gap-4 items-center">
                            <img src="${data.thumbnail}" class="w-24 h-16 rounded object-cover bg-gray-800">
                            <div class="flex-1">
                                <h3 class="text-sm font-semibold truncate">${data.title}</h3>
                                <button onclick="window.open('${data.url}')" class="btn-red mt-2 px-4 py-1 rounded text-xs font-bold uppercase">Watch</button>
                            </div>
                        </div>`;
                    });
                    root.innerHTML = snap.empty ? `<p class="text-center mt-10">No videos available</p>` : html;
                } 
                
                else if (page === 'profile') {
                    root.innerHTML = `
                        <div class="glass-card p-8 text-center mt-5">
                            <div class="w-20 h-20 bg-red-600 rounded-full mx-auto flex items-center justify-center text-3xl font-bold mb-4">U</div>
                            <h2 class="text-xl font-bold">User Account</h2>
                            <p class="text-green-200 text-sm">Status: Active</p>
                            <div class="mt-8 space-y-3">
                                <button class="w-full bg-white text-green-900 font-bold py-3 rounded-xl">Withdraw Balance</button>
                                <button class="w-full border border-white/30 py-3 rounded-xl">Transaction History</button>
                                <button class="w-full text-red-400 mt-4 underline">Logout</button>
                            </div>
                        </div>`;
                }

                else {
                    root.innerHTML = `<div class="text-center mt-20"><i class="fas fa-clock text-4xl mb-4 opacity-30"></i><p>Coming Soon...</p></div>`;
                }
            } catch (err) {
                root.innerHTML = `<p class="text-center text-red-300">Error: ${err.message}</p>`;
            }
        };

        // Initial Load
        render('video');
    </script>
</body>
</html>
