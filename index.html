<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCOIN USER</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{background:#008000;color:white;}
.card{background:rgba(255,255,255,0.1);padding:12px;border-radius:10px;margin-bottom:10px;}
</style>
</head>

<body>

<header class="p-4 flex justify-between">
<h1>TCOIN</h1>
<button onclick="googleLogin()" class="bg-white text-green-900 px-3 py-1 rounded">Login</button>
</header>

<div class="p-4">
<div id="balanceBox">Balance: 0</div>
</div>

<main id="app" class="p-4"></main>

<nav class="fixed bottom-0 w-full flex justify-around bg-black p-2 text-xs">
<button onclick="load('videos')">Video</button>
<button onclick="load('ads')">Ads</button>
<button onclick="load('apps')">Apps</button>
<button onclick="load('profile')">Profile</button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, increment, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyA7JriiGg8ebYIhasc94vZf7y0LEhdLJ0Y",
authDomain:"tcoin-9800d.firebaseapp.com",
projectId:"tcoin-9800d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* ---------------- LOGIN ---------------- */
window.googleLogin = async () => {
const provider = new GoogleAuthProvider();
const result = await signInWithPopup(auth, provider);

currentUser = result.user;

const ref = doc(db,"users",currentUser.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
name:currentUser.displayName,
email:currentUser.email,
balance:0,
refCode:currentUser.uid.slice(0,6)
});
}

loadBalance();
alert("Login Success");
};

/* ---------------- BALANCE ---------------- */
async function loadBalance(){
if(!currentUser) return;
const snap = await getDoc(doc(db,"users",currentUser.uid));
document.getElementById("balanceBox").innerText =
"Balance: " + (snap.data().balance || 0);
}

/* ---------------- EARN ---------------- */
window.watchItem = async (url,type)=>{
if(!currentUser) return alert("Login first");

window.open(url);

let reward = 5;
if(type==="ads") reward = 10;

await updateDoc(doc(db,"users",currentUser.uid),{
balance:increment(reward)
});

await addDoc(collection(db,"earn_logs"),{
uid:currentUser.uid,
type,
reward,
time:Date.now()
});

loadBalance();
alert("+"+reward+" coins");
};

/* ---------------- WITHDRAW ---------------- */
window.withdraw = async ()=>{
if(!currentUser) return;

const phone = prompt("Phone");
const amount = Number(prompt("Amount"));

await addDoc(collection(db,"withdraw_requests"),{
uid:currentUser.uid,
phone,
amount,
status:"pending"
});

alert("Withdraw sent");
};

/* ---------------- LOAD ---------------- */
window.load = async (type)=>{
const appDiv=document.getElementById("app");
appDiv.innerHTML="Loading...";

if(type==="profile"){
appDiv.innerHTML=`
<div class="card">
<button onclick="withdraw()" class="bg-red-600 px-3 py-2 rounded">Withdraw</button>
</div>`;
return;
}

const snap = await getDocs(collection(db,type));
let html="";

snap.forEach(d=>{
const data=d.data();

html+=`
<div class="card">
<h3>${data.title}</h3>
<button onclick="watchItem('${data.url}','${type}')"
class="bg-red-600 px-2 py-1 rounded text-xs">
WATCH & EARN
</button>
</div>`;
});

appDiv.innerHTML=html;
};

window.onload=()=>load("videos");
</script>

</body>
</html>
